# 算法模块配置
spring:
  # 定时任务配置
  task:
    scheduling:
      pool:
        size: 5
      thread-name-prefix: algorithm-task-

# 数据模拟配置
data:
  simulation:
    enabled: true
    # 初始化数据生成
    initial:
      enabled: true
      days: 30  # 初始生成30天的历史数据
    # 定时任务配置
    schedule:
      # 每小时数据生成
      hourly:
        enabled: true
        cron: "0 5 * * * ?"  # 每小时第5分钟执行
      # 每日数据生成
      daily:
        enabled: true
        cron: "0 0 2 * * ?"  # 每天凌晨2点执行
      # 每周数据生成
      weekly:
        enabled: true
        cron: "0 0 3 ? * SUN"  # 每周日凌晨3点执行
      # 每月数据生成
      monthly:
        enabled: true
        cron: "0 0 4 1 * ?"  # 每月1号凌晨4点执行
      # 数据清理
      cleanup:
        enabled: true
        cron: "0 0 5 * * ?"  # 每天凌晨5点执行
        retention-days: 90  # 保留90天的数据
    # 数据质量监控
    quality:
      enabled: true
      cron: "0 30 6 * * ?"  # 每天早上6:30执行
      alert-threshold: 0.7  # 质量评分低于0.7时告警

# 算法配置增强
algorithm:
  # 推荐算法权重
  distance-weight: 0.3
  rating-weight: 0.25
  free-space-weight: 0.25
  preference-weight: 0.2
  
  # 预测算法配置
  prediction:
    history-hours: 336  # 14天历史数据
    confidence-threshold: 0.6
    anomaly-threshold: 3.0  # 异常值阈值（标准差倍数）
    trend-weight: 0.3
    seasonal-weight: 0.3
    historical-weight: 0.4
  
  # 数据生成配置
  data-generation:
    # 基础占用率模式（24小时）
    base-occupancy-pattern: 
      - 15.0, 12.0, 10.0, 8.0, 10.0, 15.0,  # 0-5
      - 25.0, 45.0, 65.0, 75.0, 80.0, 85.0,  # 6-11
      - 82.0, 78.0, 75.0, 72.0, 75.0, 80.0,  # 12-17
      - 85.0, 88.0, 75.0, 60.0, 45.0, 30.0   # 18-23
    
    # 星期因子（周一到周日）
    weekly-factors: [1.1, 1.15, 1.2, 1.1, 1.05, 0.8, 0.7]
    
    # 位置因子配置
    location-factors:
      cheap-rate-threshold: 5.0    # 便宜费率阈值
      cheap-rate-factor: 1.2      # 便宜停车场因子
      expensive-rate-threshold: 20.0  # 昂贵费率阈值
      expensive-rate-factor: 0.7   # 昂贵停车场因子
    
    # 随机波动配置
    random-factor:
      enabled: true
      standard-deviation: 0.1  # 10%的随机波动
    
    # 特殊事件配置
    special-events:
      new-year:
        enabled: true
        start-month: 12
        start-day: 20
        end-month: 1
        end-day: 3
        factor: 1.3
      national-day:
        enabled: true
        start-month: 10
        start-day: 1
        end-month: 10
        end-day: 7
        factor: 1.2

# 日志配置
logging:
  level:
    cn.gp.smartparking.algorithm: INFO
    cn.gp.smartparking.algorithm.schedule: DEBUG
    cn.gp.smartparking.algorithm.service: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
