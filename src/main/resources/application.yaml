server:
  servlet:
    context-path: /smart-parking # 接口前缀

spring:
  application:
    name: smart-parking-cloud-platform
  config:
    import: optional:classpath:application-algorithm.yml
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true # 下划线转驼峰
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 打印SQL日志
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Knife4j配置
knife4j:
  enable: true
  openapi:
    title: 智慧云停车平台接口文档
    version: v1.0
    group:
      default:
        #        group-name: 默认分组
        api-rule: package
        api-rule-resources:
          - cn.gp.smartparking

# WebSocket 配置
websocket:
  # WebSocket 路径
  path: websocket
  # 心跳配置
  heartbeat:
    interval: 30000  # 30秒心跳间隔
    timeout: 90000   # 90秒超时
  # 连接配置
  connection:
    max-connections: 10000  # 最大连接数
    idle-time: 300          # 空闲时间（秒）
  # 消息配置
  message:
    max-size: 65536  # 最大消息大小（字节）
    timeout: 5000    # 消息处理超时（毫秒）

# 日志配置
logging:
  level:
    cn.gp.smartparking: INFO
    cn.gp.smartparking.websocket: DEBUG
    io.netty: INFO
    org.springframework.web: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/smart-parking.log
    max-size: 100MB
    max-history: 30
