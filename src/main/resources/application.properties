# Spring Boot 属性文件
# 用于加载环境变量或系统属性

# 数据库配置
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/smart_parking_platform?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}

# Redis配置
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# 日志配置
logging.level.cn.gp.smartparking=${LOG_LEVEL:INFO}
logging.file.name=${LOG_FILE_PATH:logs/smart-parking.log}

# WebSocket配置
websocket.port=${WEBSOCKET_PORT:8081}
